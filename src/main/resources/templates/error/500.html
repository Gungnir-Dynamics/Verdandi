<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Server error</title>
</head>
<body>
<h1>500 - Internal server error</h1>

<p>Status: <span th:text="${status}">500</span></p>
<p>Error: <span th:text="${error}">Internal Server Error</span></p>
<p th:text="${message}">An unexpected error occurred. Please try again later.</p>

<a th:href="@{/projects}">Back to projects</a>
</body>
</html>
