<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subprojects - Verdandi</title>
    <link rel="stylesheet" th:href="@{/styles.css}">
</head>
<body>

<div th:replace="navigationbar/navbar :: navbar"></div>

<div class="container">
    <div class="header">
        <h1>Subprojects - <span th:text="${project.name}"></span></h1>
        <a th:href="@{/projects/{projectId}/subprojects/create(projectId=${projectId})}"
           class="btn btn-primary">+ New Subproject</a>
    </div>

    <table th:if="${mySubProjects != null and !mySubProjects.isEmpty()}">
        <thead>
        <tr>
            <th>ID</th>
            <th>Subproject Name</th>
            <th>Description</th>
            <th>Estimated Hours</th>
            <th style="width: 380px; text-align: right;">Actions</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="sub : ${mySubProjects}">
            <td th:text="${sub.id}"></td>
            <td th:text="${sub.name}"></td>
            <td th:text="${sub.description}"></td>
            <td th:text="${sub.estimatedHours}"></td>
            <td>
                <div class="actions">
                    <a th:href="@{/projects/{projectId}/subprojects/{subprojectId}/tasks(projectId=${sub.projectId}, subprojectId=${sub.id})}"
                       class="btn btn-primary btn-sm">View Tasks</a>

                    <a th:href="@{/projects/{projectId}/subprojects/{subprojectId}/edit(projectId=${sub.projectId}, subprojectId=${sub.id})}"
                       class="btn btn-warning btn-sm">Edit</a>

                    <form th:action="@{/projects/{projectId}/subprojects/{subprojectId}/delete(projectId=${sub.projectId}, subprojectId=${sub.id})}"
                          method="post" style="display: inline;">
                        <button type="submit" class="btn btn-danger btn-sm"
                                onclick="return confirm('Delete this subproject and all its tasks?')">
                            Delete
                        </button>
                    </form>
                </div>
            </td>
        </tr>
        </tbody>
    </table>

    <div th:if="${mySubProjects == null or mySubProjects.isEmpty()}" class="no-items">
        <h2>No subprojects yet</h2>
        <a th:href="@{/projects/{projectId}/subprojects/create(projectId=${projectId})}"
           class="btn btn-primary">+ Create First Subproject</a>
    </div>
</div>

</body>
</html>
