<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Verdandi</title>
    <link rel="stylesheet" th:href="@{/styles.css}">
</head>
<body>

<div class="container" style="max-width: 480px; margin-top: 60px;">
    <div class="form-container">
        <h1 style="text-align: center; margin-bottom: 30px;">Create New User</h1>

        <div th:if="${errorMessage}" class="error" th:text="${errorMessage}"></div>

        <form method="post" action="/auth/register" th:object="${user}">

            <label for="username">Username</label>
            <input type="text" id="username" th:field="*{username}" required />

            <label for="email">Email</label>
            <input type="email" id="email" th:field="*{email}" required />

            <label for="password">Password</label>
            <input type="password" id="password" th:field="*{password}" required />

            <label for="hourlyRate">Hourly Rate (DKK)</label>
            <input type="number" id="hourlyRate" th:field="*{hourlyRate}" min="0" required />

            <label for="role">Role</label>
            <select id="role" th:field="*{role.id}">
                <option th:each="role : ${roles}"
                        th:value="${role.id}"
                        th:text="${role.roleName}"></option>
            </select>

            <div style="margin-top: 35px; display: flex; gap: 12px;">
                <button type="submit" class="btn btn-primary">Create User</button>
                <a href="/auth/show_users" class="btn btn-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>

</body>
</html>
