<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Users - Verdandi</title>
    <link rel="stylesheet" th:href="@{/styles.css}">
</head>
<body>

<div th:replace="navigationbar/navbar :: navbar"></div>

<div class="container">
    <div class="header">
        <h1>All Users</h1>
        <a th:href="@{/auth/register}" class="btn btn-primary">+ Create New User</a>
    </div>

    <table>
        <thead>
        <tr>
            <th>ID</th>
            <th>Username</th>
            <th>Email</th>
            <th>Hourly Rate</th>
            <th>Role</th>
            <th style="width: 200px; text-align: right;">Actions</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="user : ${getUsers}">
            <td th:text="${user.id}"></td>
            <td th:text="${user.username}"></td>
            <td th:text="${user.email}"></td>
            <td th:text="${user.hourlyRate} + ' DKK'"></td>
            <td th:text="${user.role?.roleName}"></td>
            <td>
                <div class="actions">
                    <a th:href="@{/auth/edit/profile/{id}(id=${user.id})}"
                       class="btn btn-warning btn-sm">Edit</a>

                    <form th:action="@{/auth/{id}/delete(id=${user.id})}"
                          method="post" style="display:inline;">
                        <button type="submit" class="btn btn-danger btn-sm"
                                onclick="return confirm('Delete this user permanently?')">
                            Delete
                        </button>
                    </form>
                </div>
            </td>
        </tr>
        </tbody>
    </table>
</div>

</body>
</html>
