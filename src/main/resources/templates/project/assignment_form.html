<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Users - Verdandi</title>
    <link rel="stylesheet" th:href="@{/styles.css}">
</head>
<body>

<div th:replace="navigationbar/navbar :: navbar"></div>

<div class="container">
    <div class="header">
        <h1>Manage Users - <span th:text="${project.name}"></span></h1>
    </div>

    <div class="form-container">

        <!-- Error message -->
        <div th:if="${errorMessage}" class="error" th:text="${errorMessage}"></div>

        <!-- Add User Section -->
        <h2>Add New User</h2>
        <form th:action="@{/projects/{projectId}/assignments/add(projectId=${projectId})}" method="post" style="max-width: 500px;">
            <label for="email">Email Address</label>
            <input type="email" id="email" name="email"
                   placeholder="Enter user email address" required />

            <button type="submit" class="btn btn-success" style="margin-top: 16px;">
                Add User to Project
            </button>
        </form>

        <hr style="margin: 50px 0;">

        <!-- Assigned Users -->
        <h2>Currently Assigned Users</h2>

        <table th:if="${users != null and !users.isEmpty()}">
            <thead>
            <tr>
                <th>Name</th>
                <th>Email</th>
                <th>Role</th>
                <th style="width: 130px; text-align: center;">Action</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="user : ${users}">
                <td th:text="${user.username}"></td>
                <td th:text="${user.email}"></td>
                <td th:text="${user.role.roleName}"></td>
                <td style="text-align: center;">
                    <form th:action="@{/projects/{projectId}/assignments/delete(projectId=${projectId})}"
                          method="post" style="margin: 0;">
                        <input type="hidden" name="userIdToDelete" th:value="${user.id}">
                        <button type="submit" class="btn btn-danger btn-sm"
                                onclick="return confirm('Remove this user from the project?')">
                            Remove
                        </button>
                    </form>
                </td>
            </tr>
            </tbody>
        </table>

        <!-- No users -->
        <div th:if="${users == null or users.isEmpty()}" class="no-items">
            <p>No users assigned to this project yet.</p>
        </div>

        <!-- Back button -->
        <div style="margin-top: 50px;">
            <a href="/projects" class="btn btn-secondary">← Back to My Projects</a>
        </div>
    </div>
</div>

</body>
</html>
