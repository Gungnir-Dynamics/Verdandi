<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Project - Verdandi</title>
    <link rel="stylesheet" th:href="@{/styles.css}">
</head>
<body>

<div th:replace="navigationbar/navbar :: navbar"></div>

<div class="container">
    <div class="header">
        <h1>Edit Project</h1>
    </div>

    <div class="form-container">
        <div th:if="${successMessage}" class="success" th:text="${successMessage}"></div>
        <div th:if="${errorMessage}" class="error" th:text="${errorMessage}"></div>

        <form th:action="@{/projects/{id}/edit(id=${projectId})}" method="post" th:object="${project}">

            <label for="name">Project Name</label>
            <input type="text" id="name" th:field="*{name}" required />

            <label for="description">Description</label>
            <textarea id="description" th:field="*{description}"></textarea>

            <label for="deadline">Deadline</label>
            <input type="date" id="deadline" th:field="*{deadline}" />

            <div style="margin-top: 35px; display: flex; gap: 12px;">
                <button type="submit" class="btn btn-primary">Save Changes</button>
                <a href="/projects" class="btn btn-secondary">Cancel</a>
            </div>
        </form>

        <hr style="margin: 40px 0; border: none; border-top: 1px solid #eee;">

        <!-- Danger Zone -->
        <h2 style="color: var(--danger);">Danger Zone</h2>
        <form th:action="@{/projects/{id}/delete(id=${projectId})}" method="post"
              onsubmit="return confirm('Are you sure you want to delete this entire project?\n\nAll sub-projects and tasks will be permanently deleted.')">
            <button type="submit" class="btn btn-danger">Delete Project</button>
        </form>
    </div>
</div>

</body>
</html>
