<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Project - Verdandi</title>

</head>
<body>
<div class="container">
    <h1>Edit Project</h1>

    <div th:if="${successMessage}" class="success" th:text="${successMessage}"></div>
    <div th:if="${errorMessage}" class="error" th:text="${errorMessage}"></div>

    <form th:action="@{/projects/{id}/edit(id=${projectId})}" method="post" th:object="${project}">
        <label for="name">Project Name</label>
        <input type="text" id="name" th:field="*{name}" required>

        <label for="description">Description</label>
        <textarea id="description" th:field="*{description}"></textarea>

        <label for="deadline">Deadline</label>
        <input type="date" id="deadline" th:field="*{deadline}">

        <div style="margin-top: 30px;">
            <button type="submit" class="btn btn-primary">Save Changes</button>
            <a href="/projects" class="btn btn-secondary">Cancel</a>
        </div>
    </form>

    <hr style="margin: 40px 0;">

    <!-- Delete section -->
    <h3 style="color: #c0392b;">Danger Zone</h3>
    <form th:action="@{/projects/{id}/delete(id=${projectId})}" method="post"
          onsubmit="return confirm('Are you sure you want to delete this entire project?\n\nNote: All sub-projects and their tasks will also be permanently deleted.')">
        <button type="submit" class="btn btn-danger">
            Delete Project
        </button>
    </form>
</div>
</body>
</html>
