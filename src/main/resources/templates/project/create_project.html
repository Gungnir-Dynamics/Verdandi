<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create New Project - Verdandi</title>
    <link rel="stylesheet" th:href="@{/styles.css}">
</head>
<body>

<div th:replace="navigationbar/navbar :: navbar"></div>

<div class="container">
    <div class="header">
        <h1>Create New Project</h1>
    </div>

    <div class="form-container">
        <div th:if="${errorMessage}" class="error" th:text="${errorMessage}"></div>

        <form th:action="@{/projects/create}" method="post" th:object="${project}">

            <label for="name">Project Name *</label>
            <input type="text" id="name" th:field="*{name}" required />

            <label for="description">Description</label>
            <textarea id="description" th:field="*{description}"></textarea>

            <label for="deadline">Deadline</label>
            <input type="date" id="deadline" th:field="*{deadline}" />

            <div style="margin-top: 30px; display: flex; gap: 12px;">
                <button type="submit" class="btn btn-primary">Create Project</button>
                <a href="/projects" class="btn btn-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>

</body>
</html>
