<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Projects - Verdandi</title>
    <link rel="stylesheet" th:href="@{/styles.css}">
</head>
<body>

<div th:replace="navigationbar/navbar :: navbar"></div>

<div class="container">
    <div class="header">
        <h1>My Projects</h1>
        <a href="/projects/create" class="btn btn-primary">+ New Project</a>
    </div>

    <!-- Messages -->
    <div th:if="${successMessage}" class="success" th:text="${successMessage}"></div>
    <div th:if="${errorMessage}" class="error" th:text="${errorMessage}"></div>

    <table th:if="${myProjects != null and !myProjects.isEmpty()}">
        <thead>
        <tr>
            <th>Project Name</th>
            <th>Estimated Hours</th>
            <th>Creation Date</th>
            <th>Deadline</th>
            <th>End Date</th>
            <th>Price</th>
            <th>Number of Workers</th>
            <th style="width: 460px; text-align: right;">Actions</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="project : ${myProjects}">
            <td th:text="${project.name}"></td>
            <td th:text="${project.estimatedHours}"></td>
            <td class="date" th:text="${project.creationDate}"></td>
            <td class="date" th:text="${project.deadline}"></td>
            <td class="date" th:text="${project.estimatedEndDate}"></td>
            <td class="price" th:text="${project.price} + ' DKK'"></td>
            <td th:text="${project.numberOfEmployees}"></td>
            <td>
                <div class="actions">
                    <a th:href="@{/projects/{projectId}/subprojects(projectId=${project.id})}"
                       class="btn btn-primary btn-sm">View Sub-Projects</a>

                    <a th:href="@{/projects/{projectId}/assignments(projectId=${project.id})}"
                       class="btn btn-success btn-sm">Manage Users</a>

                    <a th:href="@{/projects/{id}/edit(id=${project.id})}"
                       class="btn btn-warning btn-sm">Edit</a>
                </div>
            </td>
        </tr>
        </tbody>
    </table>

    <!-- No projects -->
    <div class="no-items" th:if="${myProjects == null or myProjects.isEmpty()}">
        <h2>You don't have any projects yet</h2>
        <a href="/projects/create" class="btn btn-primary">+ Create Your First Project</a>
    </div>
</div>

</body>
</html>
