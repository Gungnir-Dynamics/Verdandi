<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Task - Verdandi</title>
    <link rel="stylesheet" th:href="@{/styles.css}">
</head>
<body>

<div th:replace="navigationbar/navbar :: navbar"></div>

<div class="container">
    <div class="header">
        <h1>Create New Task</h1>
    </div>

    <div class="form-container">
        <div th:if="${errorMessage}" class="error" th:text="${errorMessage}"></div>

        <form th:action="@{|/projects/${projectId}/subprojects/${subprojectId}/tasks/create|}"
              th:object="${task}"
              method="post">

            <label for="name">Task Name *</label>
            <input type="text" id="name" th:field="*{name}" required />

            <label for="description">Description</label>
            <textarea id="description" th:field="*{description}"></textarea>

            <label for="estimatedHours">Estimated Hours</label>
            <input type="number" id="estimatedHours" th:field="*{estimatedHours}" min="0" />

            <div style="margin-top: 35px; display: flex; gap: 12px;">
                <button type="submit" class="btn btn-primary">Create Task</button>
                <a th:href="@{|/projects/${projectId}/subprojects/${subprojectId}/tasks|}"
                   class="btn btn-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>

</body>
</html>
